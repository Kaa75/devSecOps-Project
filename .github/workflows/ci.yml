name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Unit & Property-Based Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test --workspaces --if-present

      - name: Run property-based tests
        run: npm run test:pbt --workspaces --if-present

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CI_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push catalog image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG services/catalog
          docker push $ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG

      - name: Build and push cart image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG services/cart
          docker push $ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG

      - name: Build and push checkout image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG services/checkout
          docker push $ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG

      - name: Build and push auth image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG services/auth
          docker push $ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG

      - name: Build and push admin image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG services/admin
          docker push $ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG frontend
          docker push $ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG

      - name: Build and push invoice-lambda image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/invoice-lambda:$IMAGE_TAG functions/invoice-lambda
          docker push $ECR_REGISTRY/shopcloud/default/invoice-lambda:$IMAGE_TAG

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CI_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan - catalog
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/catalog:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy scan - cart
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/cart:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy scan - checkout
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/checkout:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy scan - auth
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/auth:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy scan - admin
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/admin:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy scan - frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/frontend:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy scan - invoice-lambda
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/invoice-lambda:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Secret scanning with truffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: filesystem . --fail

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform

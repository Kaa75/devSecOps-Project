name: CD — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Git SHA or tag to deploy to production (e.g. abc1234)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  approve:
    name: Manual Approval Gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Confirm deployment
        run: echo "Deploying ${{ github.event.inputs.image_tag }} to production"

  build-push-prod:
    name: Re-tag & Push Production Images to ECR
    runs-on: ubuntu-latest
    needs: approve
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
      DEV_TAG: dev-${{ github.event.inputs.image_tag }}
      PROD_TAG: prod-${{ github.event.inputs.image_tag }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_PROD_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag and push catalog
        run: |
          docker pull $ECR_REGISTRY/shopcloud/development/catalog:$DEV_TAG
          docker tag  $ECR_REGISTRY/shopcloud/development/catalog:$DEV_TAG \
                      $ECR_REGISTRY/shopcloud/production/catalog:$PROD_TAG
          docker push $ECR_REGISTRY/shopcloud/production/catalog:$PROD_TAG

      - name: Re-tag and push cart
        run: |
          docker pull $ECR_REGISTRY/shopcloud/development/cart:$DEV_TAG
          docker tag  $ECR_REGISTRY/shopcloud/development/cart:$DEV_TAG \
                      $ECR_REGISTRY/shopcloud/production/cart:$PROD_TAG
          docker push $ECR_REGISTRY/shopcloud/production/cart:$PROD_TAG

      - name: Re-tag and push checkout
        run: |
          docker pull $ECR_REGISTRY/shopcloud/development/checkout:$DEV_TAG
          docker tag  $ECR_REGISTRY/shopcloud/development/checkout:$DEV_TAG \
                      $ECR_REGISTRY/shopcloud/production/checkout:$PROD_TAG
          docker push $ECR_REGISTRY/shopcloud/production/checkout:$PROD_TAG

      - name: Re-tag and push auth
        run: |
          docker pull $ECR_REGISTRY/shopcloud/development/auth:$DEV_TAG
          docker tag  $ECR_REGISTRY/shopcloud/development/auth:$DEV_TAG \
                      $ECR_REGISTRY/shopcloud/production/auth:$PROD_TAG
          docker push $ECR_REGISTRY/shopcloud/production/auth:$PROD_TAG

      - name: Re-tag and push admin
        run: |
          docker pull $ECR_REGISTRY/shopcloud/development/admin:$DEV_TAG
          docker tag  $ECR_REGISTRY/shopcloud/development/admin:$DEV_TAG \
                      $ECR_REGISTRY/shopcloud/production/admin:$PROD_TAG
          docker push $ECR_REGISTRY/shopcloud/production/admin:$PROD_TAG

      - name: Re-tag and push invoice-lambda
        run: |
          docker pull $ECR_REGISTRY/shopcloud/development/invoice-lambda:$DEV_TAG
          docker tag  $ECR_REGISTRY/shopcloud/development/invoice-lambda:$DEV_TAG \
                      $ECR_REGISTRY/shopcloud/production/invoice-lambda:$PROD_TAG
          docker push $ECR_REGISTRY/shopcloud/production/invoice-lambda:$PROD_TAG

  deploy-prod:
    name: Deploy to Production EKS
    runs-on: ubuntu-latest
    needs: build-push-prod
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
      PROD_TAG: prod-${{ github.event.inputs.image_tag }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_PROD_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Update kubeconfig for production cluster
        run: aws eks update-kubeconfig --name shopcloud-production --region eu-west-1

      - name: Save current image tags for rollback
        run: kubectl get deployment -n shopcloud -o json > previous-deployments.json

      - name: Upload rollback snapshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rollback-snapshot-${{ github.event.inputs.image_tag }}
          path: previous-deployments.json
          retention-days: 7

      - name: Update catalog image
        run: |
          kubectl set image deployment/catalog \
            catalog=$ECR_REGISTRY/shopcloud/production/catalog:$PROD_TAG \
            -n shopcloud

      - name: Update cart image
        run: |
          kubectl set image deployment/cart \
            cart=$ECR_REGISTRY/shopcloud/production/cart:$PROD_TAG \
            -n shopcloud

      - name: Update checkout image
        run: |
          kubectl set image deployment/checkout \
            checkout=$ECR_REGISTRY/shopcloud/production/checkout:$PROD_TAG \
            -n shopcloud

      - name: Update auth image
        run: |
          kubectl set image deployment/auth \
            auth=$ECR_REGISTRY/shopcloud/production/auth:$PROD_TAG \
            -n shopcloud

      - name: Update admin image
        run: |
          kubectl set image deployment/admin \
            admin=$ECR_REGISTRY/shopcloud/production/admin:$PROD_TAG \
            -n shopcloud

      - name: Update invoice-lambda image
        run: |
          kubectl set image deployment/invoice-lambda \
            invoice-lambda=$ECR_REGISTRY/shopcloud/production/invoice-lambda:$PROD_TAG \
            -n shopcloud

      - name: Wait for catalog rollout
        id: rollout-catalog
        run: kubectl rollout status deployment/catalog -n shopcloud --timeout=5m
        continue-on-error: true

      - name: Wait for cart rollout
        id: rollout-cart
        run: kubectl rollout status deployment/cart -n shopcloud --timeout=5m
        continue-on-error: true

      - name: Wait for checkout rollout
        id: rollout-checkout
        run: kubectl rollout status deployment/checkout -n shopcloud --timeout=5m
        continue-on-error: true

      - name: Wait for auth rollout
        id: rollout-auth
        run: kubectl rollout status deployment/auth -n shopcloud --timeout=5m
        continue-on-error: true

      - name: Wait for admin rollout
        id: rollout-admin
        run: kubectl rollout status deployment/admin -n shopcloud --timeout=5m
        continue-on-error: true

      - name: Wait for invoice-lambda rollout
        id: rollout-invoice-lambda
        run: kubectl rollout status deployment/invoice-lambda -n shopcloud --timeout=5m
        continue-on-error: true

      - name: Rollback on rollout failure
        if: |
          steps.rollout-catalog.outcome == 'failure' ||
          steps.rollout-cart.outcome == 'failure' ||
          steps.rollout-checkout.outcome == 'failure' ||
          steps.rollout-auth.outcome == 'failure' ||
          steps.rollout-admin.outcome == 'failure' ||
          steps.rollout-invoice-lambda.outcome == 'failure'
        run: |
          echo "Rollout failed — initiating rollback for all services"
          kubectl rollout undo deployment/catalog        -n shopcloud
          kubectl rollout undo deployment/cart           -n shopcloud
          kubectl rollout undo deployment/checkout       -n shopcloud
          kubectl rollout undo deployment/auth           -n shopcloud
          kubectl rollout undo deployment/admin          -n shopcloud
          kubectl rollout undo deployment/invoice-lambda -n shopcloud
          exit 1

  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-prod
    steps:
      - name: Health check — catalog
        id: smoke-catalog
        run: |
          curl --fail --retry 5 --retry-delay 15 \
            ${{ secrets.PROD_ALB_URL }}/catalog/health
        continue-on-error: true

      - name: Health check — cart
        id: smoke-cart
        run: |
          curl --fail --retry 5 --retry-delay 15 \
            ${{ secrets.PROD_ALB_URL }}/cart/health
        continue-on-error: true

      - name: Health check — checkout
        id: smoke-checkout
        run: |
          curl --fail --retry 5 --retry-delay 15 \
            ${{ secrets.PROD_ALB_URL }}/checkout/health
        continue-on-error: true

      - name: Health check — auth
        id: smoke-auth
        run: |
          curl --fail --retry 5 --retry-delay 15 \
            ${{ secrets.PROD_ALB_URL }}/auth/health
        continue-on-error: true

      - name: Configure AWS credentials for rollback (OIDC)
        if: |
          steps.smoke-catalog.outcome == 'failure' ||
          steps.smoke-cart.outcome == 'failure' ||
          steps.smoke-checkout.outcome == 'failure' ||
          steps.smoke-auth.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_PROD_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Update kubeconfig for rollback
        if: |
          steps.smoke-catalog.outcome == 'failure' ||
          steps.smoke-cart.outcome == 'failure' ||
          steps.smoke-checkout.outcome == 'failure' ||
          steps.smoke-auth.outcome == 'failure'
        run: aws eks update-kubeconfig --name shopcloud-production --region eu-west-1

      - name: Rollback all services on smoke test failure
        if: |
          steps.smoke-catalog.outcome == 'failure' ||
          steps.smoke-cart.outcome == 'failure' ||
          steps.smoke-checkout.outcome == 'failure' ||
          steps.smoke-auth.outcome == 'failure'
        run: |
          echo "Smoke tests failed — rolling back all services"
          kubectl rollout undo deployment/catalog        -n shopcloud
          kubectl rollout undo deployment/cart           -n shopcloud
          kubectl rollout undo deployment/checkout       -n shopcloud
          kubectl rollout undo deployment/auth           -n shopcloud
          kubectl rollout undo deployment/admin          -n shopcloud
          kubectl rollout undo deployment/invoice-lambda -n shopcloud

      - name: Notify team on smoke test failure
        if: |
          steps.smoke-catalog.outcome == 'failure' ||
          steps.smoke-cart.outcome == 'failure' ||
          steps.smoke-checkout.outcome == 'failure' ||
          steps.smoke-auth.outcome == 'failure'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 Production smoke tests FAILED for tag \`${{ github.event.inputs.image_tag }}\`. Rollback initiated. Triggered by: ${{ github.actor }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
          exit 1

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: always()
    steps:
      - name: Notify Slack — success
        if: needs.smoke-tests.result == 'success'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Production deployment SUCCEEDED for tag \`${{ github.event.inputs.image_tag }}\`. Triggered by: ${{ github.actor }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack — failure
        if: needs.smoke-tests.result != 'success'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Production deployment FAILED for tag \`${{ github.event.inputs.image_tag }}\`. Triggered by: ${{ github.actor }}. Check the Actions run for details.\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

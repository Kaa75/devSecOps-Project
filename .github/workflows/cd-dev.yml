name: CD — Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Unit & Property-Based Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test --workspaces --if-present

      - name: Run property-based tests
        run: npm run test:pbt --workspaces --if-present

  build-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    needs: test
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push catalog
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG services/catalog
          docker push $ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG

      - name: Build and push cart
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG services/cart
          docker push $ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG

      - name: Build and push checkout
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG services/checkout
          docker push $ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG

      - name: Build and push auth
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG services/auth
          docker push $ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG

      - name: Build and push admin
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG services/admin
          docker push $ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG frontend
          docker push $ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG

      - name: Build and push invoice-lambda
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/invoice-lambda:$IMAGE_TAG functions/invoice-lambda
          docker push $ECR_REGISTRY/shopcloud/default/invoice-lambda:$IMAGE_TAG

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name shopcloud-default --region us-east-1

      - name: Apply manifest changes
        run: |
          kubectl apply -n shopcloud \
            -f infra/k8s/namespace.yaml \
            -f infra/k8s/catalog.yaml \
            -f infra/k8s/cart.yaml \
            -f infra/k8s/checkout.yaml \
            -f infra/k8s/auth.yaml \
            -f infra/k8s/admin.yaml \
            -f infra/k8s/frontend.yaml \
            -f infra/k8s/hpa.yaml \
            -f infra/k8s/network-policies.yaml
          kubectl apply -f infra/k8s/fluent-bit.yaml

      - name: Update catalog image
        run: kubectl set image deployment/catalog catalog=$ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG -n shopcloud

      - name: Update cart image
        run: kubectl set image deployment/cart cart=$ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG -n shopcloud

      - name: Update checkout image
        run: kubectl set image deployment/checkout checkout=$ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG -n shopcloud

      - name: Update auth image
        run: kubectl set image deployment/auth auth=$ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG -n shopcloud

      - name: Update admin image
        run: kubectl set image deployment/admin admin=$ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG -n shopcloud

      - name: Update frontend image
        run: kubectl set image deployment/frontend frontend=$ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG -n shopcloud

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/catalog  -n shopcloud --timeout=5m
          kubectl rollout status deployment/cart     -n shopcloud --timeout=5m
          kubectl rollout status deployment/checkout -n shopcloud --timeout=5m
          kubectl rollout status deployment/auth     -n shopcloud --timeout=5m
          kubectl rollout status deployment/admin    -n shopcloud --timeout=5m
          kubectl rollout status deployment/frontend -n shopcloud --timeout=5m

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check — catalog
        run: curl --fail --retry 5 --retry-delay 10 http://a98f519c4af93425b99b2dc81d16f3e9-1395133919.us-east-1.elb.amazonaws.com/health

      - name: Health check — cart
        run: curl --fail --retry 5 --retry-delay 10 http://ada019bcb0d9c444ea2a19d3deb7742f-1636233805.us-east-1.elb.amazonaws.com/health

      - name: Health check — checkout
        run: curl --fail --retry 5 --retry-delay 10 http://a185d62bc3d6f405085e9a71e05d3a57-285844831.us-east-1.elb.amazonaws.com/health

      - name: Health check — auth
        run: curl --fail --retry 5 --retry-delay 10 http://ae47051d5b5e74c65b6fca095b2dfbcb-2074452419.us-east-1.elb.amazonaws.com/health

      - name: Health check — frontend
        run: curl --fail --retry 5 --retry-delay 10 http://a0879b37672fa4da29fd26acaf2a6fb4-1508186753.us-east-1.elb.amazonaws.com/

name: CD - Development Deploy

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Unit & Property-Based Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test --workspaces --if-present

      - name: Run property-based tests
        run: npm run test:pbt --workspaces --if-present

  build-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    needs: test
    environment: development
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      IMAGE_TAG: dev-${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push catalog
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG services/catalog
          docker push $ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG

      - name: Build and push cart
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG services/cart
          docker push $ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG

      - name: Build and push checkout
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG services/checkout
          docker push $ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG

      - name: Build and push auth
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG services/auth
          docker push $ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG

      - name: Build and push admin
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG services/admin
          docker push $ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG frontend
          docker push $ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG

      - name: Build and push invoice-lambda
        run: |
          docker build -t $ECR_REGISTRY/shopcloud/default/invoice-lambda:$IMAGE_TAG functions/invoice-lambda
          docker push $ECR_REGISTRY/shopcloud/default/invoice-lambda:$IMAGE_TAG

  deploy:
    name: Deploy to Development EKS
    runs-on: ubuntu-latest
    needs: build-push
    environment: development
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      IMAGE_TAG: dev-${{ github.sha }}
      K8S_NAMESPACE: shopcloud-dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name shopcloud-default --region us-east-1

      - name: Ensure target namespace exists
        run: kubectl create namespace $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Validate Kubernetes app secret exists
        run: |
          if ! kubectl get secret shopcloud-secrets -n $K8S_NAMESPACE >/dev/null 2>&1; then
            echo "ERROR: Kubernetes secret shopcloud-secrets does not exist in namespace $K8S_NAMESPACE."
            exit 1
          fi

      - name: Render manifests for development namespace
        run: |
          mkdir -p rendered-k8s
          cp infra/k8s/*.yaml rendered-k8s/
          perl -pi -e 's/namespace: shopcloud/namespace: $ENV{K8S_NAMESPACE}/g; s/name: shopcloud$/name: $ENV{K8S_NAMESPACE}/g; s/environment: production/environment: development/g; s#image:\s*\S+/shopcloud/default/([a-z-]+):\S+#image: $ENV{ECR_REGISTRY}/shopcloud/default/$1:$ENV{IMAGE_TAG}#g' rendered-k8s/*.yaml

      - name: Apply manifest changes
        run: |
          kubectl apply -f rendered-k8s/namespace.yaml
          kubectl apply -f rendered-k8s/serviceaccounts.yaml
          kubectl apply -n $K8S_NAMESPACE \
            -f rendered-k8s/catalog.yaml \
            -f rendered-k8s/cart.yaml \
            -f rendered-k8s/checkout.yaml \
            -f rendered-k8s/auth.yaml \
            -f rendered-k8s/admin.yaml \
            -f rendered-k8s/frontend.yaml \
            -f rendered-k8s/hpa.yaml \
            -f rendered-k8s/network-policies.yaml
          kubectl apply -f rendered-k8s/fluent-bit.yaml

      - name: Update catalog image
        run: kubectl set image deployment/catalog catalog=$ECR_REGISTRY/shopcloud/default/catalog:$IMAGE_TAG -n $K8S_NAMESPACE

      - name: Update cart image
        run: kubectl set image deployment/cart cart=$ECR_REGISTRY/shopcloud/default/cart:$IMAGE_TAG -n $K8S_NAMESPACE

      - name: Update checkout image
        run: kubectl set image deployment/checkout checkout=$ECR_REGISTRY/shopcloud/default/checkout:$IMAGE_TAG -n $K8S_NAMESPACE

      - name: Update auth image
        run: kubectl set image deployment/auth auth=$ECR_REGISTRY/shopcloud/default/auth:$IMAGE_TAG -n $K8S_NAMESPACE

      - name: Update admin image
        run: kubectl set image deployment/admin admin=$ECR_REGISTRY/shopcloud/default/admin:$IMAGE_TAG -n $K8S_NAMESPACE

      - name: Update frontend image
        run: kubectl set image deployment/frontend frontend=$ECR_REGISTRY/shopcloud/default/frontend:$IMAGE_TAG -n $K8S_NAMESPACE

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/catalog  -n $K8S_NAMESPACE --timeout=5m
          kubectl rollout status deployment/cart     -n $K8S_NAMESPACE --timeout=5m
          kubectl rollout status deployment/checkout -n $K8S_NAMESPACE --timeout=5m
          kubectl rollout status deployment/auth     -n $K8S_NAMESPACE --timeout=5m
          kubectl rollout status deployment/admin    -n $K8S_NAMESPACE --timeout=5m
          kubectl rollout status deployment/frontend -n $K8S_NAMESPACE --timeout=5m

  smoke-tests:
    name: Development Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: development
    env:
      K8S_NAMESPACE: shopcloud-dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CD_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name shopcloud-default --region us-east-1

      - name: Health check - catalog
        run: |
          ENDPOINT=$(kubectl get svc catalog -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          [[ -z "$ENDPOINT" ]] && ENDPOINT=$(kubectl get svc catalog -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl --fail --retry 5 --retry-delay 10 "http://$ENDPOINT/health"

      - name: Health check - cart
        run: |
          ENDPOINT=$(kubectl get svc cart -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          [[ -z "$ENDPOINT" ]] && ENDPOINT=$(kubectl get svc cart -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl --fail --retry 5 --retry-delay 10 "http://$ENDPOINT/health"

      - name: Health check - checkout
        run: |
          ENDPOINT=$(kubectl get svc checkout -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          [[ -z "$ENDPOINT" ]] && ENDPOINT=$(kubectl get svc checkout -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl --fail --retry 5 --retry-delay 10 "http://$ENDPOINT/health"

      - name: Health check - auth
        run: |
          ENDPOINT=$(kubectl get svc auth -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          [[ -z "$ENDPOINT" ]] && ENDPOINT=$(kubectl get svc auth -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl --fail --retry 5 --retry-delay 10 "http://$ENDPOINT/health"

      - name: Health check - admin
        run: |
          kubectl run admin-health-check --rm -i --restart=Never \
            --image=curlimages/curl -n $K8S_NAMESPACE \
            -- curl -sf http://admin/health

      - name: Health check - frontend
        run: |
          ENDPOINT=$(kubectl get svc frontend -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          [[ -z "$ENDPOINT" ]] && ENDPOINT=$(kubectl get svc frontend -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl --fail --retry 5 --retry-delay 10 "http://$ENDPOINT/"

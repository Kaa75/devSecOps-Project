version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shopcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopcloud
      POSTGRES_USER: shopcloud
      POSTGRES_PASSWORD: shopcloud_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopcloud -d shopcloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopcloud-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: shopcloud-localstack
    restart: unless-stopped
    environment:
      SERVICES: sqs,s3,ses,cognito-idp,secretsmanager
      DEFAULT_REGION: us-east-1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"running\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  localstack_data:

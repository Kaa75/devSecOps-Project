# Base image: node:20-alpine (Alpine-based for minimal footprint)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: shopcloud
  labels:
    app: catalog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      serviceAccountName: catalog
      securityContext:
        runAsNonRoot: true
      containers:
        - name: catalog
          image: <AWS_ACCOUNT_ID>.dkr.ecr.eu-west-1.amazonaws.com/shopcloud/production/catalog:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: DATABASE_URL
            - name: CLOUDFRONT_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: CLOUDFRONT_DOMAIN
            - name: AWS_XRAY_DAEMON_ADDRESS
              value: "xray-daemon:2000"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
        - name: xray-daemon
          image: amazon/aws-xray-daemon:latest
          ports:
            - containerPort: 2000
              protocol: UDP
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: shopcloud
spec:
  type: ClusterIP
  selector:
    app: catalog
  ports:
    - port: 80
      targetPort: 3000

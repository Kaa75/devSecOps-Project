# Base image: node:20-alpine (Alpine-based for minimal footprint)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: shopcloud
  labels:
    app: cart
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      serviceAccountName: cart
      containers:
        - name: cart
          image: 379604374648.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/cart:latest
          ports:
            - containerPort: 3001
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: JWT_SECRET
            - name: AWS_XRAY_DAEMON_ADDRESS
              value: "127.0.0.1:2000"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
        - name: xray-daemon
          image: amazon/aws-xray-daemon:latest
          ports:
            - containerPort: 2000
              protocol: UDP
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: shopcloud
spec:
  type: LoadBalancer
  selector:
    app: cart
  ports:
    - port: 80
      targetPort: 3001

# Base image: node:20-alpine (Alpine-based for minimal footprint)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: shopcloud
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: auth
      securityContext:
        runAsNonRoot: true
      containers:
        - name: auth
          image: 379604374648.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/auth:latest
          ports:
            - containerPort: 3000
          env:
            - name: COGNITO_CUSTOMER_POOL_ID
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: COGNITO_CUSTOMER_POOL_ID
            - name: COGNITO_ADMIN_POOL_ID
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: COGNITO_ADMIN_POOL_ID
            - name: COGNITO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: COGNITO_CLIENT_ID
            - name: AWS_XRAY_DAEMON_ADDRESS
              value: "xray-daemon:2000"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: shopcloud
spec:
  type: LoadBalancer
  selector:
    app: auth
  ports:
    - port: 80
      targetPort: 3000

# Base image: node:20-alpine (Alpine-based for minimal footprint)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: shopcloud
  labels:
    app: checkout
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      serviceAccountName: checkout
      containers:
        - name: checkout
          image: 379604374648.dkr.ecr.us-east-1.amazonaws.com/shopcloud/default/checkout:latest
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: REDIS_URL
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: SQS_QUEUE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopcloud-secrets
                  key: JWT_SECRET
            - name: AWS_XRAY_DAEMON_ADDRESS
              value: "127.0.0.1:2000"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
        - name: xray-daemon
          image: amazon/aws-xray-daemon:latest
          ports:
            - containerPort: 2000
              protocol: UDP
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: shopcloud
spec:
  type: LoadBalancer
  selector:
    app: checkout
  ports:
    - port: 80
      targetPort: 3002
